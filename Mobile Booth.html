<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decision Booth — ลองมาเป็น รมต. กระทรวงวัฒนธรรม</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous">
  <style>
    @font-face { font-family:"Anakotmai"; src:url("fonts/anakotmai-light.woff2") format("woff2"); font-weight:300; font-display:swap; }
    @font-face { font-family:"Anakotmai"; src:url("fonts/anakotmai-medium.woff2") format("woff2"); font-weight:500; font-display:swap; }
    @font-face { font-family:"Anakotmai"; src:url("fonts/anakotmai-bold.woff2") format("woff2"); font-weight:700; font-display:swap; }

    :root {
      --bg:#0B0A08; --s1:#161512; --s2:#201F1C; --s3:#2A2925;
      --bd:rgba(255,255,255,0.09); --bdo:rgba(255,106,20,0.30);
      --or:#FF6A14; --or-dim:rgba(255,106,20,0.10); --glow:0 0 22px rgba(255,106,20,0.28);
      --tx:#E8E3DC; --tx2:#A09B93; --tx3:#65615A;
      --red:#FF6961; --blue:#6B9BFB;
      --f:"Anakotmai","IBM Plex Sans Thai",system-ui,sans-serif;
      --mono:"JetBrains Mono",monospace;
      --ease:cubic-bezier(0.22,1,0.36,1);
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body {
      background:var(--bg); color:var(--tx); font-family:var(--f);
      font-weight:300; -webkit-font-smoothing:antialiased; min-height:100vh; overflow-x:hidden;
    }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none;
      background-image:radial-gradient(circle,rgba(255,106,20,0.06) 1px,transparent 1px);
      background-size:28px 28px; z-index:0;
    }
    #root { min-height:100vh; position:relative; z-index:1; }
    .page { max-width:430px; margin:0 auto; min-height:100vh; }

    /* ── RESPONSIVE ── */
    @media (min-width:600px) {
      body { display:flex; justify-content:center; align-items:flex-start; }
      #root { width:100%; }
      .page { max-width:520px; }
      .proj-grid { grid-template-columns:repeat(4,1fr); }
      .sbar { max-width:520px; }
      .sheet { max-width:520px; }
      .bfm { max-width:520px; }
    }
    @media (min-width:900px) {
      .page { max-width:560px; }
      .sbar { max-width:560px; }
      .sheet { max-width:560px; }
      .bfm { max-width:560px; }
      .proj-grid { grid-template-columns:repeat(4,1fr); gap:10px; padding:16px 16px 180px; }
      .results { padding:0 24px 120px; }
      .intro { padding:64px 48px; }
    }
    .pop { animation:popIn .38s var(--ease) both; }
    @keyframes popIn { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }

    /* ── INTRO ── */
    .intro { min-height:100vh; display:flex; flex-direction:column; justify-content:center; padding:52px 28px; }
    .eyebrow {
      font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
      color:var(--or); margin-bottom:20px; display:flex; align-items:center; gap:8px;
    }
    .big-title { font-weight:700; font-size:clamp(42px,12vw,62px); line-height:1.04; letter-spacing:-.025em; }
    .big-title em { color:var(--or); font-style:normal; }
    .rule { width:40px; height:2px; background:var(--or); margin:26px 0; }
    .intro-desc { font-size:16px; font-weight:300; line-height:1.7; color:var(--tx2); margin-bottom:24px; }
    .intro-desc strong { color:var(--tx); font-weight:500; }
    .event-ad {
      margin-top:20px; padding:14px 16px; border-radius:8px;
      background:var(--or-dim); border:1px solid var(--bdo);
    }
    .event-ad-label {
      font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
      color:var(--or); margin-bottom:5px;
    }
    .event-ad-title { font-size:18px; font-weight:700; margin-bottom:3px; }
    .event-ad-detail { font-size:13px; color:var(--tx2); margin-bottom:4px; }
    .event-ad-note { font-size:11px; color:var(--tx3); }

    /* ── BUTTONS ── */
    .btn {
      display:flex; align-items:center; justify-content:center; gap:8px;
      font-family:var(--f); font-size:16px; font-weight:500;
      padding:16px 24px; border-radius:4px; border:none; cursor:pointer; width:100%;
      transition:all 120ms var(--ease);
    }
    .btn:active { transform:scale(0.97); }
    .btn-or { background:var(--or); color:#fff; box-shadow:var(--glow); }
    .btn-or:hover { background:#FA4C05; }
    .btn-or:disabled { opacity:.32; cursor:not-allowed; box-shadow:none; }
    .btn-ghost { background:transparent; color:var(--tx2); border:1px solid var(--bd); }
    .btn-ghost:hover { border-color:var(--bdo); color:var(--tx); }
    .btn-sm { padding:12px 20px; font-size:14px; }

    /* ── PLAY HEADER (remaining hero) ── */
    .ph {
      position:sticky; top:0; z-index:20;
      background:rgba(11,10,8,.96); backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid var(--bd); padding:16px 20px 14px;
    }
    .ph-remaining-lbl { font-size:11px; font-weight:500; color:var(--tx3); margin-bottom:2px; letter-spacing:.05em; }
    .ph-remaining-num {
      font-family:var(--mono); font-size:52px; font-weight:600; line-height:1;
      transition:color .2s; color:var(--tx);
    }
    .ph-remaining-num.is-zero { color:var(--or); }
    .ph-remaining-num.is-over { color:var(--red); }
    .ph-remaining-unit { font-size:15px; color:var(--tx2); margin-left:6px; }

    /* ── SQUARE CARD GRID ── */
    .proj-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:14px 14px 180px; }
    .sq-card {
      aspect-ratio:1; background:var(--s1); border:1px solid var(--bd);
      border-radius:16px; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:8px;
      cursor:pointer; padding:12px 8px; text-align:center;
      transition:border-color .15s, background .15s, transform .1s;
      position:relative;
    }
    .sq-card:active { transform:scale(0.94); }
    .sq-card--active { border-color:var(--bdo); background:rgba(255,106,20,0.09); }
    .sq-icon { font-size:26px; line-height:1; color:var(--tx2); transition:color .15s; }
    .sq-card--active .sq-icon { color:var(--or); }
    .sq-name {
      font-size:11px; font-weight:500; color:var(--tx2); line-height:1.35;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .sq-card--active .sq-name { color:var(--tx); }
    .sq-alloc {
      position:absolute; top:6px; right:6px;
      background:var(--or); color:#fff;
      font-family:var(--mono); font-size:9px; font-weight:600;
      padding:2px 5px; border-radius:3px; line-height:1.3;
    }

    /* ── SUBMIT BAR ── */
    .sbar {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:430px; padding:10px 14px 28px;
      background:linear-gradient(to top,var(--bg) 70%,transparent); z-index:20;
    }
    .sbar-progress-row {
      display:flex; align-items:center; gap:10px; margin-bottom:8px;
    }
    .sbar-bar-wrap { flex:1; height:4px; background:var(--s2); border-radius:2px; overflow:hidden; }
    .sbar-bar-fill { height:100%; border-radius:2px; transition:width .2s var(--ease), background .2s; }
    .sbar-num { font-family:var(--mono); font-size:12px; font-weight:600; white-space:nowrap; transition:color .2s; }

    /* ── BOTTOM SHEET ── */
    .sheet-overlay {
      position:fixed; inset:0; background:rgba(11,10,8,0.75); z-index:40;
      display:flex; align-items:flex-end; justify-content:center;
    }
    .sheet {
      background:var(--s2); border-radius:16px 16px 0 0;
      padding:12px 24px 44px; width:100%; max-width:430px;
      max-height:92vh; overflow-y:auto; -webkit-overflow-scrolling:touch;
      animation:sheetUp .3s var(--ease) both;
    }
    @keyframes sheetUp { from{transform:translateY(100%);}to{transform:translateY(0);} }
    .sheet-handle { width:36px; height:4px; background:var(--bd); border-radius:2px; margin:0 auto 22px; }
    .sheet-icon { font-size:22px; color:var(--or); flex-shrink:0; }
    .sheet-name { font-size:18px; font-weight:700; margin-bottom:20px; }
    .sheet-val-row { display:flex; align-items:baseline; justify-content:center; gap:5px; margin-bottom:4px; }
    .sheet-agency {
      display:inline-flex; align-items:center; gap:5px;
      font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
      color:var(--or); background:var(--or-dim); border:1px solid var(--bdo);
      border-radius:99px; padding:3px 10px 3px 8px;
    }
    .sheet-agency::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--or); flex-shrink:0; }
    .sheet-val-unit { font-size:16px; color:var(--tx2); }
    .sheet-max { font-size:11px; color:var(--tx2); text-align:center; margin-bottom:14px; }
    .sheet-val-input {
      font-family:var(--mono); font-size:42px; font-weight:600;
      color:var(--or); line-height:1;
      background:var(--s1);
      border:1.5px solid var(--bd); border-radius:8px;
      outline:none; width:150px; text-align:center;
      padding:10px 12px;
      caret-color:var(--or); transition:border-color .15s, color .2s;
      -moz-appearance:textfield;
    }
    .sheet-val-input:focus { border-color:var(--bdo); }
    .sheet-val-input::-webkit-inner-spin-button,
    .sheet-val-input::-webkit-outer-spin-button { -webkit-appearance:none; }
    .sheet-val-input.sheet-val--zero { color:var(--tx3); }
    .sheet-actions { display:grid; grid-template-columns:1fr 2fr; gap:8px; margin-top:20px; }

    /* Slider */
    input[type=range] { -webkit-appearance:none; appearance:none; width:100%; height:4px; border-radius:2px; outline:none; cursor:pointer; }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; width:32px; height:32px; border-radius:50%;
      background:var(--or); cursor:pointer;
      box-shadow:0 0 0 4px rgba(255,106,20,.16); transition:box-shadow .15s;
    }
    input[type=range]:active::-webkit-slider-thumb { box-shadow:0 0 0 7px rgba(255,106,20,.20), var(--glow); }
    input[type=range]::-moz-range-thumb { width:32px; height:32px; border-radius:50%; background:var(--or); border:none; }
    input[type=range]::-moz-range-progress { background:var(--or); height:4px; border-radius:2px; }
    input[type=range]::-moz-range-track { background:var(--s2); height:4px; border-radius:2px; }

    /* ── BUDGET FULL MODAL ── */
    .bfm-overlay {
      position:fixed; inset:0; background:rgba(11,10,8,0.88); z-index:60;
      display:flex; align-items:flex-end; justify-content:center;
    }
    .bfm {
      background:var(--s2); border-top:2px solid var(--or);
      padding:28px 24px 48px; width:100%; max-width:430px;
      text-align:center; animation:sheetUp .3s var(--ease) both;
    }
    .bfm-icon { font-size:36px; color:var(--or); margin-bottom:12px; }
    .bfm-title { font-size:22px; font-weight:700; margin-bottom:8px; }
    .bfm-sub { font-size:14px; color:var(--tx2); margin-bottom:24px; line-height:1.6; }
    .bfm-actions { display:flex; flex-direction:column; gap:8px; }

    /* ── SENDING OVERLAY ── */
    .overlay {
      position:fixed; inset:0; background:rgba(11,10,8,.92);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:16px; z-index:80;
    }
    .spinner { width:36px; height:36px; border:2px solid var(--s2); border-top-color:var(--or); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg);} }

    /* ── RESULTS ── */
    .results { padding:0 16px 110px; }
    .r-top { text-align:center; padding:36px 16px 28px; border-bottom:1px solid var(--bd); margin-bottom:24px; }
    .r-check { width:52px; height:52px; border-radius:50%; background:var(--or-dim); border:1px solid var(--bdo); display:flex; align-items:center; justify-content:center; margin:0 auto 14px; font-size:20px; color:var(--or); }
    .r-title { font-size:24px; font-weight:700; margin-bottom:8px; }
    .r-sub { font-size:13px; color:var(--tx2); line-height:1.65; }
    .r-sub strong { color:var(--tx); font-weight:500; }
    .sec-lbl { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--tx3); margin-bottom:10px; }

    .ranklist { display:flex; flex-direction:column; gap:5px; margin-bottom:22px; }
    .ri { display:flex; align-items:center; gap:10px; background:var(--s1); border:1px solid var(--bd); border-radius:6px; padding:11px 13px; }
    .ri-n { font-family:var(--mono); font-size:11px; font-weight:600; color:var(--or); min-width:18px; }
    .ri-ic { font-size:15px; min-width:18px; text-align:center; color:var(--tx2); }
    .ri-nm { flex:1; font-size:13px; font-weight:500; }
    .ri-vl { font-family:var(--mono); font-size:15px; font-weight:600; }
    .vl-on { color:var(--or); }
    .vl-off { color:var(--tx3); }

    .insight { background:var(--s1); border:1px solid rgba(255,106,20,0.16); border-radius:8px; padding:14px 15px; margin-bottom:12px; }
    .insight-lbl { font-size:10px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,106,20,0.7); margin-bottom:7px; }
    .insight-txt { font-size:13px; line-height:1.72; color:var(--tx2); }
    .insight-txt strong { color:#C8C3BB; font-weight:500; }

    .cmp-table { margin-bottom:24px; }
    .cmp-head {
      display:grid; grid-template-columns:1fr 40px 46px;
      gap:6px; padding:5px 2px;
      font-size:9px; font-weight:700; letter-spacing:.07em; text-transform:uppercase;
      color:var(--tx3); border-bottom:1px solid var(--bd); margin-bottom:2px;
    }
    .cmp-row {
      display:grid; grid-template-columns:1fr 40px 46px;
      gap:6px; padding:8px 4px;
      border-bottom:1px solid rgba(255,255,255,0.04);
      align-items:center; cursor:pointer;
    }
    .cmp-row:active { background:rgba(255,255,255,0.03); border-radius:4px; }
    .cmp-proj { font-size:12px; color:var(--tx2); line-height:1.35; }
    .cmp-you { font-family:var(--mono); font-size:14px; font-weight:600; text-align:right; }
    .cmp-you--on { color:var(--or); }
    .cmp-you--off { color:var(--tx3); }
    .cmp-govt { font-family:var(--mono); font-size:12px; color:var(--blue); text-align:right; }
    .cmp-expand {
      padding:8px 12px 10px; margin-bottom:2px;
      background:var(--s1); border-radius:6px;
      font-size:11px; color:var(--tx2); line-height:1.7;
    }

    /* ── BAR CHART ── */
    .bc-row { display:flex; flex-direction:column; gap:6px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
    .bc-row:last-child { border-bottom:none; }
    .bc-head { display:flex; align-items:center; gap:7px; }
    .bc-icon { font-size:13px; flex-shrink:0; transition:color .2s; }
    .bc-icon--on  { color:var(--or); }
    .bc-icon--off { color:var(--tx3); }
    .bc-name { font-size:12px; color:var(--tx2); flex:1; }
    .bc-info-btn {
      width:18px; height:18px; border-radius:50%;
      background:var(--s2); border:1px solid var(--bd);
      color:var(--tx3); font-size:9px; font-weight:700;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; flex-shrink:0; transition:border-color .15s, color .15s;
    }
    .bc-info-btn:hover { border-color:var(--bdo); color:var(--or); }
    .bc-cols { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .bc-side { display:flex; flex-direction:column; gap:3px; }
    .bc-side-lbl { font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
    .bc-side-lbl-or { color:var(--or); }
    .bc-side-lbl-bl { color:var(--blue); }
    .bc-bar-row { display:flex; align-items:center; gap:5px; }
    .bc-track { flex:1; height:6px; background:var(--s2); border-radius:3px; overflow:hidden; }
    .bc-fill { height:100%; border-radius:3px; transition:width .6s var(--ease); }
    .bc-fill-or { background:var(--or); }
    .bc-fill-bl { background:var(--blue); }
    .bc-pct { font-family:var(--mono); font-size:10px; font-weight:600; width:30px; text-align:right; flex-shrink:0; }
    .bc-pct-or { color:var(--or); }
    .bc-pct-bl { color:var(--blue); opacity:.8; }
    .bc-detail { margin-top:5px; padding:8px 10px; background:var(--s1); border-radius:6px; font-size:11px; color:var(--tx2); line-height:1.7; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">


const { useState, useMemo, useCallback, useEffect, useRef } = React;

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbywO-O9qzJLcaC3g3Fw2JUtlCTIINuID4uCf6D9x_eAhzk17X7_Xe9Whm96bCGvXtIV/exec';
const MAX = 100;

const PROJECTS = [
  { id:'heritage', icon:'fa-landmark',       name:'โบราณสถาน/มรดกวัฒนธรรม',       agencies:'กรมศิลปากร',                                   realBaht:2809.0, realPct:58.0 },
  { id:'film',     icon:'fa-film',           name:'หนัง/ซีรีส์/แอนิเมชัน',          agencies:'กรมส่งเสริมวัฒนธรรม + หอภาพยนตร์',           realBaht:798.5,  realPct:16.5 },
  { id:'intl',     icon:'fa-globe',          name:'นิทรรศการ/เทศกาลนานาชาติ',       agencies:'CEA + สำนักงานศิลปวัฒนธรรมร่วมสมัย + กรมส่งเสริมวัฒนธรรม',          realBaht:361.8,  realPct:7.5  },
  { id:'cea',      icon:'fa-city',           name:'เศรษฐกิจสร้างสรรค์',             agencies:'CEA (สำนักนายกรัฐมนตรี)',                     realBaht:293.6,  realPct:6.1  },
  { id:'game',     icon:'fa-gamepad',        name:'เกม/แอนิเมชัน/ดิจิทัล',          agencies:'DEPA + กรมส่งเสริมวัฒนธรรม + DITP',          realBaht:199.3,  realPct:4.1  },
  { id:'jewelry',  icon:'fa-gem',            name:'เครื่องประดับ',                   agencies:'สถาบันวิจัยและพัฒนาอัญมณีฯ (DITP)',           realBaht:190.4,  realPct:3.8  },
  { id:'fashion',  icon:'fa-shirt',          name:'แฟชัน',                           agencies:'DITP (กระทรวงพาณิชย์)',                       realBaht:158.1,  realPct:3.3  },
  { id:'perform',  icon:'fa-masks-theater',  name:'ศิลปะการแสดง',                   agencies:'กรมส่งเสริมวัฒนธรรม + สำนักงานศิลปวัฒนธรรมร่วมสมัย',                realBaht:72.2,   realPct:1.5  },
  { id:'book',     icon:'fa-book',           name:'หนังสือ/วรรณกรรม',               agencies:'กรมส่งเสริมวัฒนธรรม + สำนักงานศิลปวัฒนธรรมร่วมสมัย',                realBaht:58.1,   realPct:1.2  },

/* ── Project Popup (bottom sheet) ── */
function ProjectSheet({ project, value, remaining, onSave, onClose }) {
  const [local, setLocal] = useState(value);
  const [inputStr, setInputStr] = useState(value === 0 ? '' : String(value));
  const sliderMax = value + remaining;
  const pct = sliderMax > 0 ? local / sliderMax * 100 : 0;
  const track = `linear-gradient(to right,#FF6A14 ${pct}%,rgba(255,255,255,0.15) ${pct}%)`;

  const syncFromSlider = (v) => {
    setLocal(v);
    setInputStr(v === 0 ? '' : String(v));
  };

  return (
    <div className="sheet-overlay" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheet-handle" />
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18}}>
          <i className={`fa-solid ${project.icon} sheet-icon`}></i>
          <div className="sheet-name" style={{margin:0}}>{project.name}</div>
        </div>
        <div className="sheet-val-row">
          <input
            type="number" inputMode="numeric"
            className={`sheet-val-input ${local === 0 ? 'sheet-val--zero' : ''}`}
            value={inputStr}
            min={0} max={sliderMax}
            onFocus={(e) => e.target.select()}
            onChange={(e) => {
              /* strip leading zeros so "05" becomes "5" */
              const raw = e.target.value.replace(/^0+(?=\d)/, '');
              setInputStr(raw);
              const n = parseInt(raw, 10);
              if (!isNaN(n)) setLocal(Math.max(0, Math.min(sliderMax, n)));
              else setLocal(0);
            }}
            onBlur={() => {
              const n = parseInt(inputStr, 10);
              const clamped = isNaN(n) ? 0 : Math.max(0, Math.min(sliderMax, n));
              setLocal(clamped);
              setInputStr(clamped === 0 ? '' : String(clamped));
            }} />
          <span className="sheet-val-unit">ล้านบาท</span>
        </div>
        <div className="sheet-max">
          {sliderMax < MAX
            ? `จัดสรรได้สูงสุด ${sliderMax}M (งบเหลือ ${remaining}M)`
            : `จัดสรรได้สูงสุด ${MAX}M`}
        </div>
        <div style={{ position:'relative', marginBottom:4 }}>
          <input
            type="range" min="0" max={sliderMax} step="5" value={local}
            style={{ background: track }}
            aria-label={project.name}
            onChange={(e) => syncFromSlider(parseInt(e.target.value))} />
          <div style={{ display:'flex', justifyContent:'center', alignItems:'center', gap:6, marginTop:10, color:'var(--tx2)', fontSize:11, fontFamily:'var(--f)' }}>
            <span style={{ fontSize:14 }}>👆</span>
            <span>ลากวงกลมสีส้มหรือพิมพ์ตัวเลขด้านบน</span>
          </div>
        </div>
        <div className="sheet-actions">
          <button className="btn btn-ghost btn-sm" onClick={onClose}>ยกเลิก</button>
          <button className="btn btn-or btn-sm" onClick={() => onSave(project.id, local)}>บันทึก</button>
        </div>
      </div>
    </div>);
}

/* ── Page 1 — Play ── */
function PlayPage({ alloc, onChange, onSubmit, sending }) {
  const total = useMemo(() => Object.values(alloc).reduce((s, v) => s + v, 0), [alloc]);
  const remaining = MAX - total;
  const isOver = total > MAX;
  const pct = Math.min(total / MAX * 100, 100);

  const [openId, setOpenId] = useState(null);
  const [showBudgetFull, setBudgetFull] = useState(false);
  const prevTotal = useRef(total);

  useEffect(() => {
    if (total >= MAX && prevTotal.current < MAX) setBudgetFull(true);
    prevTotal.current = total;
  }, [total]);

  const handleSave = useCallback((id, val) => {
    const others = Object.entries(alloc).filter(([k]) => k !== id).reduce((s, [, v]) => s + v, 0);
    onChange(id, Math.max(0, Math.min(val, MAX - others)));
    setOpenId(null);
  }, [alloc, onChange]);

  const openProject = openId ? PROJECTS.find((p) => p.id === openId) : null;

  const remClass = isOver ? 'is-over' : remaining === 0 ? 'is-zero' : '';

  return (
    <div className="pop">
      {sending &&
        <div className="overlay">
          <div className="spinner"></div>
          <span style={{ color:'var(--tx2)', fontSize:13 }}>กำลังประชุมคณะกรรมการงบประมาณ...จะสรุปผลให้เร็วๆนี้!</span>
        </div>}
      {showBudgetFull &&
        <BudgetFullModal
          onSubmit={() => { setBudgetFull(false); onSubmit(); }}
          onEdit={() => setBudgetFull(false)} />}
      {openProject &&
        <ProjectSheet
          project={openProject}
          value={alloc[openId]}
          remaining={remaining}
          onSave={handleSave}
          onClose={() => setOpenId(null)} />}

      {/* Top header — REMAINING hero number */}
      <div className="ph">
        <div className="ph-remaining-lbl">งบคงเหลือ</div>
        <div style={{ display:'flex', alignItems:'baseline' }}>
          <span className={`ph-remaining-num ${isOver ? 'is-over' : remaining === 0 ? 'is-zero' : ''}`}>{remaining}</span>
          <span className="ph-remaining-unit">ล้านบาท</span>
        </div>
      </div>

      <div className="proj-grid">
        {PROJECTS.map((p) => {
          const v = alloc[p.id];
          return (
            <button
              key={p.id}
              className={`sq-card ${v > 0 ? 'sq-card--active' : ''}`}
              onClick={() => setOpenId(p.id)}
              aria-label={p.name}>
              {v > 0 && <span className="sq-alloc">{v}M</span>}
              <i className={`fa-solid ${p.icon} sq-icon`}></i>
              <span className="sq-name">{p.name}</span>
            </button>);
        })}
      </div>

      {/* Bottom bar — progress + allocated + submit */}
      <div className="sbar">
        <div className="sbar-progress-row">
          <span style={{ fontSize:11, color:'var(--tx3)', whiteSpace:'nowrap' }}>จัดสรรแล้ว</span>
          <div className="sbar-bar-wrap">
            <div className="sbar-bar-fill" style={{ width:`${pct}%`, background: isOver ? 'var(--red)' : 'var(--or)' }} />
          </div>
          <span className="sbar-num" style={{ color: isOver ? 'var(--red)' : total > 0 ? 'var(--or)' : 'var(--tx3)' }}>{total}/100M</span>
        </div>
        <button
          className="btn btn-or"
          disabled={total !== MAX || sending}
          onClick={() => onSubmit()}>
          {sending ? 'กำลังส่ง...' : total < MAX ? `ยังเหลือ ${remaining}M` : 'ส่งคำตอบ →'}
        </button>
      </div>
    </div>);
}

                <div className="bc-head">
                  <i className={`fa-solid ${p.icon} bc-icon ${hasAlloc ? 'bc-icon--on' : 'bc-icon--off'}`}></i>
                  <span className="bc-name" style={{ color: hasAlloc ? 'var(--tx)' : 'var(--tx3)' }}>{p.name}</span>
                  <button
                    className="bc-info-btn"
                    onClick={() => setExpandedRow(isOpen ? null : p.id)}
                    aria-label={`ข้อมูล ${p.name}`}>
                    i
                  </button>
                </div>
                <div className="bc-cols">
                  <div className="bc-side">
                    <span className="bc-side-lbl bc-side-lbl-or">คุณ</span>
                    <div className="bc-bar-row">
                      <div className="bc-track"><div className="bc-fill bc-fill-or" style={{ width:`${uW}%` }} /></div>
                      <span className="bc-pct" style={{ color: hasAlloc ? 'var(--or)' : 'var(--tx3)' }}>{p.a}%</span>
                    </div>
                  </div>
                  <div className="bc-side">
                    <span className="bc-side-lbl bc-side-lbl-bl">รัฐ</span>
                    <div className="bc-bar-row">
                      <div className="bc-track"><div className="bc-fill bc-fill-bl" style={{ width:`${gW}%` }} /></div>
                      <span className="bc-pct bc-pct-bl">{p.realPct}%</span>
                    </div>
                  </div>
                </div>
                {isOpen &&
                  <div className="bc-detail">
                    <div><strong style={{ color:'var(--tx)' }}>งบจริง: </strong>{p.realBaht.toLocaleString()} ล้านบาท</div>
                    <div><strong style={{ color:'var(--tx)' }}>หน่วยงาน: </strong>{p.agencies}</div>
                  </div>}
              </div>);
          });
        })()}
      </div>

      <button className="btn btn-ghost" style={{ marginBottom:16 }} onClick={onReset}>เล่นอีกครั้ง</button>
    </div>);
}

/* ── App ── */
function App() {
  const [page, setPage] = useState(0);
  const [alloc, setAlloc] = useState(() => Object.fromEntries(PROJECTS.map((p) => [p.id, 0])));
  const [sending, setSending] = useState(false);

  const handleChange = useCallback((id, val) => setAlloc((prev) => ({ ...prev, [id]: val })), []);

  const handleSubmit = async () => {
    setSending(true);
    try {
      await fetch(APPS_SCRIPT_URL, {
        method:'POST',
        body: JSON.stringify({
          timestamp: new Date().toISOString(),
          session_id: SESSION_ID,
          ...alloc,
          total: Object.values(alloc).reduce((s, v) => s + v, 0)
        })
      });
    } catch (_) { /* fail gracefully */ }
    setSending(false);
    setPage(2);
  };

  const handleReset = () => {
    setAlloc(Object.fromEntries(PROJECTS.map((p) => [p.id, 0])));
    setPage(0);
  };

  return (
    <div className="page">
      {page === 0 && <IntroPage onStart={() => setPage(1)} />}
      {page === 1 && <PlayPage alloc={alloc} onChange={handleChange} onSubmit={handleSubmit} sending={sending} />}
      {page === 2 && <ResultsPage alloc={alloc} onReset={handleReset} />}
    </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
